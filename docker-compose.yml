services:
  deltagravity:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: "host"
    image: deltagravity:local
    container_name: deltagravity
    restart: unless-stopped
    command: ["node", "dist/index.js"]
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/cayetano/Proyectos:/home/cayetano/Proyectos
      - /home/cayetano/Proyectos/DeltaGravity/service-account.json:/app/service-account.json:ro
